name: Scrape CEO News

on:
  schedule:
    # Run every hour at :00 (UTC)
    - cron: '0 * * * *'
  workflow_dispatch:   # Allow manual trigger from GitHub UI

permissions:
  contents: write      # Needed to commit data back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install feedparser httpx beautifulsoup4 python-dateutil lxml

      - name: Run scraper
        run: python scrape_static.py

      - name: Commit and push updated data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: update CEO news data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
