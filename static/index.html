<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto CEO Tracker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand">
        <span class="brand-icon">⬡</span>
        <div>
          <h1 class="brand-title">Crypto CEO Tracker</h1>
          <p class="brand-sub">实时追踪顶级交易所 CEO 核心观点</p>
        </div>
      </div>

      <div class="header-right">
        <div class="stats-chips" id="statsChips">
          <span class="stat-chip" id="statTotal">
            <span class="stat-num">—</span> 条资讯
          </span>
          <span class="stat-chip update-chip">
            最后更新：<span id="lastUpdated">加载中…</span>
          </span>
        </div>
        <button class="btn-refresh" id="refreshBtn" onclick="triggerRefresh()">
          <svg class="icon-spin" id="refreshIcon" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
          刷新
        </button>
      </div>
    </div>
  </header>

  <!-- ===== CONTROLS ===== -->
  <div class="controls-bar">
    <div class="controls-inner">
      <!-- CEO filter tabs -->
      <div class="ceo-tabs" id="ceoTabs">
        <button class="ceo-tab active" data-ceo="all" onclick="filterByCEO('all', this)">
          全部
        </button>
        <!-- CEO buttons injected by JS -->
      </div>

      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="搜索关键词…"
          oninput="onSearch()"
        />
        <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
      </div>
    </div>
  </div>

  <!-- ===== CEO STATS BAR ===== -->
  <div class="ceo-stats-bar" id="ceoStatsBar"></div>

  <!-- ===== ACTIVE TAG FILTER ===== -->
  <div class="active-tag-bar" id="activeTagBar" style="display:none;">
    <span>标签筛选：</span>
    <span class="active-tag" id="activeTagLabel"></span>
    <button onclick="clearTagFilter()">✕ 清除</button>
  </div>

  <!-- ===== MAIN TIMELINE ===== -->
  <main class="main-content">
    <div id="loadingState" class="loading-state">
      <div class="spinner"></div>
      <p>正在加载数据…</p>
    </div>

    <div id="emptyState" class="empty-state" style="display:none;">
      <span class="empty-icon">📭</span>
      <p>暂无匹配结果</p>
    </div>

    <div class="timeline" id="timeline"></div>

    <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
      <button class="btn-load-more" onclick="loadMore()">加载更多</button>
    </div>
  </main>

  <!-- ===== AUTO-REFRESH TOAST ===== -->
  <div class="toast" id="toast"></div>

  <script src="/static/app.js"></script>
</body>
</html>
